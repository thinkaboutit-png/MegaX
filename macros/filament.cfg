######################################################################
# Filament Load / Unload
######################################################################

# Modeled on the MatterHackers Pulse XE macros: fast-load then slow
# purge; slow purge then fast retract.  The Pulse XE runs its fast
# moves at max_extrude_only_velocity, which suits its 50mm direct-drive
# load, but pushing 600mm of bowden at that speed risks the LGX
# grinding when filament reaches the melt zone, so the fast speed here
# is a tunable variable instead.  Both macros turn the hotend off when
# they finish.
#
# Usage: LOAD_FILAMENT [TEMP=220] [SPEED=300]
#        UNLOAD_FILAMENT [TEMP=220] [SPEED=300]

[gcode_macro LOAD_FILAMENT]
variable_load_distance: 600     # LGX to nozzle through the bowden tube
variable_purge_distance: 40
variable_fast_speed: 2400       # 40mm/s
gcode:
    {% set speed = params.SPEED|default(300)|float %}
    {% set temp = params.TEMP|default(220)|float %}

    RESPOND TYPE=echo MSG="Load: heating nozzle to {temp}°C"
    M109 S{temp}                    # Wait for nozzle

    SAVE_GCODE_STATE NAME=load_state
    G91                             # Relative positioning
    G92 E0
    RESPOND TYPE=echo MSG="Load: feeding {load_distance}mm"
    G1 E{load_distance} F{fast_speed}   # Fast-load through the tube
    RESPOND TYPE=echo MSG="Load: purging {purge_distance}mm"
    G1 E{purge_distance} F{speed}   # Purge
    G1 E-2 F2400                    # Relieve pressure
    RESTORE_GCODE_STATE NAME=load_state

    M104 S0                         # Turn off nozzle
    RESPOND TYPE=echo MSG="Load complete, heater off"

[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance: 620   # Tube length plus margin
variable_purge_distance: 25
variable_fast_speed: 2400       # 40mm/s
gcode:
    {% set speed = params.SPEED|default(300)|float %}
    {% set temp = params.TEMP|default(220)|float %}

    RESPOND TYPE=echo MSG="Unload: heating nozzle to {temp}°C"
    M109 S{temp}                    # Wait for nozzle

    SAVE_GCODE_STATE NAME=unload_state
    G91                             # Relative positioning
    G92 E0
    RESPOND TYPE=echo MSG="Unload: purging {purge_distance}mm"
    G1 E{purge_distance} F{speed}   # Soften the tip
    RESPOND TYPE=echo MSG="Unload: retracting {unload_distance}mm"
    G1 E-{unload_distance} F{fast_speed}  # Fast-unload
    RESTORE_GCODE_STATE NAME=unload_state

    M104 S0                         # Turn off nozzle
    RESPOND TYPE=echo MSG="Unload complete, heater off"
